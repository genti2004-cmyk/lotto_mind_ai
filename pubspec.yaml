name: lotto_mind_ai
description: "Lotto Mind AI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  hive_ce: ^2.13.0
  hive_ce_flutter: ^2.3.4
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  file_picker: ^10.3.10
  pdf: ^3.10.8
  printing: ^5.12.0
  intl: ^0.19.0
  open_filex: ^4.4.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/splash_logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  adaptive_icon_foreground: "assets/app_icon.png"
  adaptive_icon_background: "#0D47A1"

flutter_native_splash:
  color: "#0D47A1"
  image: assets/app_icon.png
  android_12:
    image: assets/app_icon.png
    icon_background_color: "#0D47A1"